# Basic Site Configuration
name: "Junteng Liu"
title: "Junteng Liu"
description: "First-year PhD candidate at HKUST NLP Group, researching natural language processing and machine learning."
url: "https://nolopap09.github.io"
baseurl: "/LJT-Homepage"
repository: "nolopap09/LJT-Homepage"

# Personal Info
email: "jliugi@connect.ust.hk"
github_username: "Vicent0205"
twitter_username: "junteng88716710"
google_scholar_url: "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"
location: "Hong Kong"
employer: "Hong Kong University of Science and Technology"
author:
  name: "Junteng Liu"
  bio: "First-year PhD candidate at HKUST NLP Group, working on natural language processing and machine learning."
  avatar: "profile.jpg"
  location: "Hong Kong"

# Navigation
nav:
  - title: "About"
    href: "/about/"
  - title: "Publications"
    href: "/publications/"

# Jekyll Build Settings
markdown: kramdown
remote_theme: academicpages/academicpages.github.io
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-paginate

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      author_profile: true
      layout: single
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      author_profile: true
      layout: single
      share: true

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Include/Exclude Files
include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Publishing
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Compression
sass:
  sass_dir: _sass
  style: compressed

# Plugins
whitelist:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-paginate
